<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>GW2 獨立多軸計時器</title>
    <style>
        :root {
            --bg: #0f111a;
            --track: #1a1c2c;
            --primary: #5c7cfa;
            --accent: #fcc419;
            --text: #eceef2;
            --text-dim: #909296;
            --now-line: #ff4444;
        }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        
        .timer-viewport { position: relative; width: 100%; margin: 0 auto; background: var(--track); border-radius: 8px; overflow: hidden; }

        /* 時間軸刻度 */
        .time-scale {
            position: sticky; top: 0; height: 35px; background: #25283d;
            border-bottom: 1px solid #3d415b; z-index: 101;
        }
        .tick {
            position: absolute; border-left: 1px solid #444; height: 100vh; /* 讓刻度線貫穿所有軸 */
            font-size: 11px; color: var(--text-dim); padding-left: 4px; padding-top: 5px; pointer-events: none;
        }

        /* 每一條獨立軸 */
        .meta-track {
            position: relative; height: 45px; border-bottom: 1px solid #2d3045;
            display: flex; align-items: center; transition: background 0.2s;
        }
        .meta-track:hover { background: rgba(255,255,255,0.05); }

        /* 左側標籤區 */
        .meta-info {
            position: sticky; left: 0; width: 180px; height: 100%;
            background: #1a1c2c; z-index: 100; display: flex; flex-direction: column;
            justify-content: center; padding-left: 10px; border-right: 2px solid var(--primary);
            box-shadow: 5px 0 10px rgba(0,0,0,0.5); font-size: 13px;
        }
        .region-tag { font-size: 10px; color: var(--primary); font-weight: bold; text-transform: uppercase; }
        .meta-name { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 事件 Bar */
        .event-bar {
            position: absolute; height: 28px; background: #3b4261;
            border-radius: 4px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; padding: 0 8px;
            font-size: 11px; white-space: nowrap; color: #fff; z-index: 10;
        }
        .event-bar.active { background: #c92a2a; border-color: #ff8787; box-shadow: 0 0 8px rgba(201, 42, 42, 0.6); }
        .event-bar .note { font-size: 10px; color: #ffcc00; margin-left: 5px; opacity: 0.9; }

        /* 現在時間紅線 */
        .now-line {
            position: absolute; top: 0; bottom: 0; width: 2px;
            background: var(--now-line); z-index: 102; pointer-events: none;
            box-shadow: 0 0 10px var(--now-line);
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        #clock { font-size: 1.5em; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="header">
    <div id="clock">00:00:00</div>
    <div style="font-size: 12px; color: var(--text-dim);">
        <span style="color:var(--now-line)">█</span> 現在時間 | 
        <span style="color:var(--primary)">█</span> 獨立 Meta 軸 
    </div>
</div>

<div class="timer-viewport">
    <div class="time-scale" id="time-scale"></div>
    <div class="now-line" id="now-indicator"></div>
    <div id="tracks-container"></div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvM633_pUbjqHmD7B4CgH5wyL4qxxA3Vrae1uARWf3RXz0a3hV2HtWF_kqpSg2W7bhXQLUVUdhqs5Y/pub?gid=0&single=true&output=csv";
const RANGE_MINS = 150; // 顯示未來 150 分鐘
const LEFT_OFFSET_MINS = 20; // 顯示過去 20 分鐘
const PIXELS_PER_MIN = 8; // 每分鐘佔幾像素 (可調整縮放)
const TRACK_LABEL_WIDTH = 180;

async function init() {
    try {
        const response = await fetch(CSV_URL, { cache: "no-store" });
        const csvText = await response.text();
        const data = parseCSV(csvText);
        render(data);
    } catch (e) { console.error("Error:", e); }
}

function parseCSV(csv) {
    const lines = csv.split(/\r?\n/);
    const headers = lines[0].split(',').map(h => h.trim());
    return lines.slice(1).filter(l => l.trim().includes(',')).map(line => {
        const values = line.split(',');
        let obj = {};
        headers.forEach((h, i) => obj[h] = values[i] ? values[i].trim() : "");
        return obj;
    });
}

function render(data) {
    const container = document.getElementById('tracks-container');
    const scale = document.getElementById('time-scale');
    const nowIndicator = document.getElementById('now-indicator');
    
    container.innerHTML = "";
    scale.innerHTML = "";

    const now = new Date();
    const currentUTCMin = (now.getUTCHours() * 60) + now.getUTCMinutes();

    // 1. 設置現在時間紅線位置
    const nowPos = TRACK_LABEL_WIDTH + (LEFT_OFFSET_MINS * PIXELS_PER_MIN);
    nowIndicator.style.left = nowPos + "px";

    // 2. 畫時間刻度 (每 15 分鐘一個)
    for (let i = -LEFT_OFFSET_MINS; i <= RANGE_MINS; i += 15) {
        const tick = document.createElement('div');
        tick.className = 'tick';
        tick.style.left = (nowPos + (i * PIXELS_PER_MIN)) + "px";
        const t = (currentUTCMin + i + 1440) % 1440;
        tick.innerText = `${Math.floor(t/60).toString().padStart(2,'0')}:${(t%60).toString().padStart(2,'0')}`;
        scale.appendChild(tick);
    }

    // 3. 處理每一個 Meta 為獨立一行
    data.forEach(item => {
        const region = item["區域"];
        const metaName = item["Meta名稱"];
        const startStr = item["開始時間"];
        const endStr = item["結束時間"];
        const interval = parseInt(item["週期"]);

        if (!metaName || !startStr || !interval) return;

        const startMin = timeToMin(startStr);
        let duration = 20; 
        if (endStr && endStr.includes(':')) {
            duration = timeToMin(endStr) - startMin;
            if (duration < 0) duration += 1440;
        }

        const track = document.createElement('div');
        track.className = 'meta-track';
        track.innerHTML = `
            <div class="meta-info">
                <div class="region-tag">${region}</div>
                <div class="meta-name">${metaName}</div>
            </div>
        `;

        // 找出視野內的場次
        for (let t = startMin; t < startMin + 2880; t += interval) {
            let eventStart = t % 1440;
            let diff = eventStart - currentUTCMin;
            
            // 處理跨日邏輯修正
            if (diff < -720) diff += 1440;
            if (diff > 720) diff -= 1440;

            if (diff > -duration - 30 && diff < RANGE_MINS) {
                const bar = document.createElement('div');
                const isActive = (diff <= 0 && diff > -duration);
                bar.className = 'event-bar' + (isActive ? ' active' : '');
                
                const barLeft = nowPos + (diff * PIXELS_PER_MIN);
                const barWidth = duration * PIXELS_PER_MIN;

                bar.style.left = barLeft + "px";
                bar.style.width = barWidth + "px";
                bar.innerHTML = `<span>${minToTime(eventStart)}</span><span class="note">${item["註記"] || ""}</span>`;
                track.appendChild(bar);
            }
        }
        container.appendChild(track);
    });

    document.getElementById('clock').innerText = now.toLocaleTimeString();
}

function timeToMin(t) {
    const [h, m] = t.split(':').map(Number);
    return (h * 60) + (m || 0);
}

function minToTime(m) {
    const h = Math.floor(m / 60).toString().padStart(2, '0');
    const mins = (m % 60).toString().padStart(2, '0');
    return `${h}:${mins}`;
}

init();
setInterval(init, 30000); 
</script>
</body>
</html>
