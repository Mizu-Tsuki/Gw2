<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GW2 多軸 Meta 監控儀表板</title>
    <style>
        :root {
            --bg: #0f111a;
            --card: #1a1c2c;
            --primary: #5c7cfa;
            --accent: #fcc419;
            --text: #eceef2;
            --text-dim: #909296;
            --danger: #e03131;
            --success: #37b24d;
        }

        body { 
            font-family: "Microsoft JhengHei", "Segoe UI", sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; line-height: 1.5;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        .header {
            text-align: center; margin-bottom: 30px; padding: 20px;
            background: var(--card); border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        #clock { font-size: 2.2em; font-weight: bold; color: var(--primary); }
        .utc-info { font-size: 0.9em; color: var(--text-dim); margin-top: 5px; }

        .axis-row { 
            background: var(--card); border-radius: 10px; 
            padding: 18px; margin-bottom: 25px; 
            border-left: 6px solid var(--primary);
        }

        .axis-title { 
            font-size: 1.4em; font-weight: bold; margin-bottom: 15px; 
            color: var(--primary); border-bottom: 1px solid #33364d;
            padding-bottom: 10px;
        }

        .event-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 15px; 
        }

        .event-card { 
            background: #25283d; border-radius: 8px; padding: 15px; 
            border: 1px solid #33364d; transition: 0.2s;
            position: relative; overflow: hidden;
        }

        .event-card.active { border-color: var(--danger); box-shadow: 0 0 10px rgba(224, 49, 49, 0.2); }

        .event-time { color: var(--accent); font-weight: bold; font-size: 1.1em; margin-bottom: 8px; }
        .event-name { font-size: 1.1em; font-weight: 600; margin-bottom: 8px; }

        .status-badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 0.8em; font-weight: bold; margin-left: 5px;
        }
        .bg-now { background: var(--danger); color: white; }
        .bg-wait { background: var(--success); color: white; }

        .event-note { 
            font-size: 0.85em; color: var(--text-dim); padding-top: 10px; 
            border-top: 1px solid #3d415b; margin-top: 10px;
            word-break: break-all; min-height: 1.2em;
        }

        .error-box { background: #441111; color: #ff9999; padding: 20px; border-radius: 8px; text-align: center; }
        footer { text-align: center; margin-top: 40px; color: #444; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div id="clock">00:00:00</div>
        <div class="utc-info" id="utc-clock">UTC 載入中...</div>
    </div>

    <div id="app">
        <div style="text-align:center; padding:40px; color:#666;">讀取試算表資料中...</div>
    </div>

    <footer>
        資料來源：Google Sheets (已連結至您的 CSV) <br>
        同步機制：UTC 時間對照 / 每 60 秒自動更新
    </footer>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvM633_pUbjqHmD7B4CgH5wyL4qxxA3Vrae1uARWf3RXz0a3hV2HtWF_kqpSg2W7bhXQLUVUdhqs5Y/pub?gid=0&single=true&output=csv";

function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString('zh-TW', {hour12:false});
    const h = now.getUTCHours().toString().padStart(2, '0');
    const m = now.getUTCMinutes().toString().padStart(2, '0');
    document.getElementById('utc-clock').innerText = `目前系統 UTC 時間：${h}:${m} (自動顯示 2 小時內活動)`;
}
setInterval(updateClock, 1000);
updateClock();

async function init() {
    try {
        const response = await fetch(CSV_URL, { cache: "no-store" });
        if (!response.ok) throw new Error("無法連線至 Google Sheets");
        const csvText = await response.text();
        const data = parseCSV(csvText);
        render(data);
    } catch (err) {
        document.getElementById('app').innerHTML = `<div class="error-box"><h3>讀取失敗</h3>${err.message}</div>`;
    }
}

function parseCSV(csv) {
    const lines = csv.split(/\r?\n/);
    if (lines.length < 1) return [];

    // 解析 Header 並清理隱藏字元
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
    
    const result = [];
    for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        // 過濾掉完全空白或只有逗號的無效行
        if (!line || line.replace(/,/g, '').length === 0) continue;

        const values = line.split(',');
        const obj = {};
        headers.forEach((h, index) => {
            obj[h] = values[index] ? values[index].trim().replace(/^"|"$/g, '') : "";
        });
        result.push(obj);
    }
    return result;
}

function render(data) {
    const app = document.getElementById('app');
    app.innerHTML = "";

    const now = new Date();
    const currentUTCMin = (now.getUTCHours() * 60) + now.getUTCMinutes();
    const WINDOW = 120; // 顯示未來 120 分鐘

    const groups = {};

    data.forEach(item => {
        // --- 精確對應您的 CSV 標題 ---
        const region = item["區域"];
        const metaName = item["Meta名稱"] || item["Meta"]; // 若名稱沒填，抓 Meta 代號
        const startStr = item["開始時間"];
        const endStr = item["結束時間"];
        const intervalStr = item["週期"];
        const note = item["註記"];

        if (!region || !startStr || !intervalStr) return;
        if (!groups[region]) groups[region] = [];

        const startMin = timeToMin(startStr);
        const interval = parseInt(intervalStr);
        
        // 持續時間計算：若沒填結束時間，預設 30 分
        let duration = 30;
        if (endStr && endStr.includes(':')) {
            duration = timeToMin(endStr) - startMin;
            if (duration < 0) duration += 1440;
        }

        // 計算 24 小時內的所有循環
        for (let t = startMin; t < startMin + 1440; t += interval) {
            let eventTime = t % 1440;
            let diff = eventTime - currentUTCMin;
            
            // 處理跨日邏輯：將 diff 限制在 -720 到 720 分鐘之間
            if (diff < -720) diff += 1440;
            if (diff > 720) diff -= 1440;

            // 顯示條件：未來 120 分鐘內 OR 正在進行中 (diff 介於 0 到 -duration)
            if ((diff > 0 && diff <= WINDOW) || (diff <= 0 && diff > -duration)) {
                groups[region].push({
                    name: metaName,
                    note: note,
                    timeDisplay: minToTime(eventTime),
                    wait: diff,
                    isActive: diff <= 0
                });
            }
        }
    });

    const sortedRegions = Object.keys(groups).sort();
    if (sortedRegions.length === 0) {
        app.innerHTML = '<div style="text-align:center; padding:50px; color:#555;">目前時段無對應活動。</div>';
        return;
    }

    sortedRegions.forEach(region => {
        const section = document.createElement('div');
        section.className = 'axis-row';
        
        // 該區域內依時間排序
        groups[region].sort((a, b) => a.wait - b.wait);

        let html = `<div class="axis-title">${region}</div><div class="event-grid">`;
        
        groups[region].forEach(ev => {
            const badgeClass = ev.isActive ? 'bg-now' : 'bg-wait';
            const badgeText = ev.isActive ? '進行中' : `${ev.wait}m`;

            html += `
                <div class="event-card ${ev.isActive ? 'active' : ''}">
                    <div class="event-time">${ev.timeDisplay} <span class="status-badge ${badgeClass}">${badgeText}</span></div>
                    <div class="event-name">${ev.name}</div>
                    <div class="event-note">${ev.note || ""}</div>
                </div>
            `;
        });

        html += `</div>`;
        section.innerHTML = html;
        app.appendChild(section);
    });
}

function timeToMin(t) {
    if (!t) return 0;
    const parts = t.split(':');
    return (parseInt(parts[0]) * 60) + (parseInt(parts[1] || 0));
}

function minToTime(m) {
    const h = Math.floor(m / 60).toString().padStart(2, '0');
    const mins = (m % 60).toString().padStart(2, '0');
    return `${h}:${mins}`;
}

init();
setInterval(init, 60000); // 每分鐘自動更新
</script>

</body>
</html>
