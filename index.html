<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>GW2 Wiki 風格多軸計時器</title>
    <style>
        :root {
            --bg: #111;
            --track-bg: #222;
            --marker-color: #ff4444;
            --primary: #5c7cfa;
        }
        body { font-family: sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 20px; }
        
        .timer-container { position: relative; width: 100%; max-width: 1400px; margin: 0 auto; overflow-x: hidden; }

        /* 時間刻度尺 */
        .time-scale {
            position: relative; height: 30px; border-bottom: 1px solid #444;
            margin-bottom: 10px; display: flex;
        }
        .time-tick {
            position: absolute; border-left: 1px solid #555; height: 10px; bottom: 0;
            font-size: 10px; padding-left: 3px; color: #888;
        }

        /* 每一條軸 (軌道) */
        .axis-row {
            position: relative; height: 60px; background: var(--track-bg);
            margin-bottom: 5px; border-radius: 4px; display: flex; align-items: center;
        }
        .axis-label {
            position: absolute; left: 10px; z-index: 10; font-weight: bold;
            background: rgba(0,0,0,0.7); padding: 2px 5px; border-radius: 3px; pointer-events: none;
        }

        /* 事件色塊 */
        .event-bar {
            position: absolute; height: 40px; background: var(--primary);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;
            display: flex; flex-direction: column; justify-content: center;
            padding: 0 10px; box-sizing: border-box; font-size: 12px;
            overflow: hidden; white-space: nowrap; transition: left 0.5s linear;
        }
        .event-bar.active { background: #c92a2a; box-shadow: 0 0 10px #ff4444; }
        .event-bar .name { font-weight: bold; }
        .event-bar .note { font-size: 10px; opacity: 0.8; }

        /* 現在時間紅線 */
        .now-indicator {
            position: absolute; top: 0; bottom: 0; width: 2px;
            background: var(--marker-color); z-index: 100;
            box-shadow: 0 0 5px #ff4444;
        }
        
        .header { text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="header">
    <h2 id="clock">00:00:00</h2>
    <p id="utc-hint">正在載入試算表資料...</p>
</div>

<div class="timer-container" id="timer-box">
    <div class="time-scale" id="scale"></div>
    <div id="tracks"></div>
    <div class="now-indicator" id="now-line" style="left: 10%;"></div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvM633_pUbjqHmD7B4CgH5wyL4qxxA3Vrae1uARWf3RXz0a3hV2HtWF_kqpSg2W7bhXQLUVUdhqs5Y/pub?gid=0&single=true&output=csv";
const VIEW_RANGE = 120; // 顯示未來 120 分鐘
const NOW_OFFSET_PCT = 10; // "現在" 紅線位在左側 10% 處，保留一點過去的視野

async function init() {
    try {
        const response = await fetch(CSV_URL, { cache: "no-store" });
        const csvText = await response.text();
        const data = parseCSV(csvText);
        render(data);
    } catch (e) { console.error(e); }
}

function parseCSV(csv) {
    const lines = csv.split(/\r?\n/);
    const headers = lines[0].split(',').map(h => h.trim());
    return lines.slice(1).filter(l => l.trim().includes(',')).map(line => {
        const values = line.split(',');
        let obj = {};
        headers.forEach((h, i) => obj[h] = values[i] ? values[i].trim() : "");
        return obj;
    });
}

function render(data) {
    const tracksContainer = document.getElementById('tracks');
    const scaleContainer = document.getElementById('scale');
    tracksContainer.innerHTML = "";
    scaleContainer.innerHTML = "";

    const now = new Date();
    const currentUTCMin = (now.getUTCHours() * 60) + now.getUTCMinutes();
    
    // 1. 生成時間刻度 (120 分鐘)
    for (let i = -10; i <= VIEW_RANGE; i += 15) {
        const tick = document.createElement('div');
        tick.className = 'time-tick';
        tick.style.left = `${((i + 10) / (VIEW_RANGE + 10)) * 100}%`;
        const tickTime = (currentUTCMin + i + 1440) % 1440;
        tick.innerText = `${Math.floor(tickTime/60).toString().padStart(2,'0')}:${(tickTime%60).toString().padStart(2,'0')}`;
        scaleContainer.appendChild(tick);
    }

    // 2. 分組與計算
    const groups = {};
    data.forEach(item => {
        const region = item["區域"];
        const name = item["Meta名稱"] || item["Meta"];
        const startStr = item["開始時間"];
        const endStr = item["結束時間"];
        const interval = parseInt(item["週期"]);
        if (!region || !startStr || !interval) return;

        if (!groups[region]) groups[region] = [];

        const startMin = timeToMin(startStr);
        let duration = 20; 
        if (endStr) {
            duration = timeToMin(endStr) - startMin;
            if (duration < 0) duration += 1440;
        }

        for (let t = startMin; t < startMin + 1440; t += interval) {
            let eventT = t % 1440;
            let diff = eventT - currentUTCMin;
            if (diff < -720) diff += 1440;
            if (diff > 720) diff -= 1440;

            // 如果活動在視野內 (-15分到+120分)
            if (diff > -duration - 10 && diff < VIEW_RANGE) {
                groups[region].push({ name, note: item["註記"], start: diff, duration });
            }
        }
    });

    // 3. 繪製軌道
    Object.keys(groups).sort().forEach(region => {
        const row = document.createElement('div');
        row.className = 'axis-row';
        row.innerHTML = `<div class="axis-label">${region}</div>`;

        groups[region].forEach(ev => {
            const bar = document.createElement('div');
            bar.className = 'event-bar' + (ev.start <= 0 ? ' active' : '');
            
            // 計算位置：(時間偏移 + 10分鐘緩衝) / 總顯示長度
            const totalRange = VIEW_RANGE + 10;
            const left = ((ev.start + 10) / totalRange) * 100;
            const width = (ev.duration / totalRange) * 100;

            bar.style.left = `${left}%`;
            bar.style.width = `${width}%`;
            bar.innerHTML = `<div class="name">${ev.name}</div><div class="note">${ev.note || ""}</div>`;
            row.appendChild(bar);
        });
        tracksContainer.appendChild(row);
    });

    document.getElementById('clock').innerText = now.toLocaleTimeString();
    document.getElementById('utc-hint').innerText = `目前 UTC ${Math.floor(currentUTCMin/60).toString().padStart(2,'0')}:${(currentUTCMin%60).toString().padStart(2,'0')} | 自動同步 Wiki 樣式多軸`;
}

function timeToMin(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
}

init();
setInterval(init, 30000); // 30秒刷一次
</script>
</body>
</html>
